    <style>
        .pd-wrap { max-width:1000px; margin:120px auto 60px; padding:0 24px; }
        .pd-back { display:inline-flex; align-items:center; gap:6px; font-size:14px; color:var(--text-light); margin-bottom:32px; transition:color .3s; }
        .pd-back:hover { color:var(--orange); }
        .pd-layout { display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:start; }
        .pd-visual { position:sticky; top:100px; }
        .pd-visual-box {
            aspect-ratio:1; max-width:420px;
            background:linear-gradient(135deg,#f8f8f8,#e8e8e8); border-radius:16px;
            border:1px solid var(--border);
            display:flex; align-items:center; justify-content:center;
            box-shadow:var(--shadow); overflow:hidden;
        }
        .pd-visual-box img { width:100%; height:100%; object-fit:contain; border-radius:16px; }
        .pd-visual-box .pd-visual-fallback { text-align:center; }
        .pd-visual-box .pd-visual-fallback .pd-v-model { font-size:48px; font-weight:700; color:rgba(0,0,0,.08); font-family:var(--font-display); letter-spacing:-1px; }
        .pd-visual-box .pd-visual-fallback .pd-v-cap { font-size:16px; color:rgba(0,0,0,.15); font-weight:500; margin-top:4px; }
        .pd-tag { display:inline-block; font-size:11px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; color:var(--orange); margin-bottom:12px; }
        .pd-title { font-family:var(--font-display); font-size:clamp(24px,3vw,34px); font-weight:700; letter-spacing:-.5px; line-height:1.2; margin-bottom:20px; }
        .pd-price { font-size:32px; font-weight:700; color:var(--text); margin-bottom:4px; }
        .pd-price-desc { font-size:14px; color:var(--text-light); margin-bottom:24px; }
        .pd-divider { height:1px; background:var(--border); margin:24px 0; }
        .pd-specs { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:32px; }
        .pd-spec { padding:12px 16px; background:var(--bg); border-radius:8px; }
        .pd-spec-label { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-light); margin-bottom:2px; }
        .pd-spec-value { font-size:15px; font-weight:600; color:var(--text); }
        .pd-qty { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
        .pd-qty label { font-size:14px; color:var(--text-light); }
        .pd-qty input { width:100px; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:15px; text-align:center; outline:none; }
        .pd-qty input:focus { border-color:var(--orange); }
        .pd-qty span { font-size:13px; color:var(--text-light); }
        .pd-btns { display:flex; gap:12px; }
        .pd-btn-primary { flex:1; padding:14px; background:var(--orange); color:#fff; border:none; border-radius:50px; font-size:15px; font-weight:500; cursor:pointer; text-align:center; transition:all .3s; }
        .pd-btn-primary:hover { background:#e55e00; transform:scale(1.02); }
        .pd-btn-secondary { flex:1; padding:14px; background:#fff; color:var(--text); border:1.5px solid var(--border); border-radius:50px; font-size:15px; font-weight:500; cursor:pointer; text-align:center; transition:all .3s; text-decoration:none; display:flex; align-items:center; justify-content:center; }
        .pd-btn-secondary:hover { border-color:var(--orange); color:var(--orange); }
        .pd-success { display:none; background:#00A65A; color:#fff; padding:14px 20px; border-radius:8px; margin-bottom:20px; font-size:14px; text-align:center; }
        .pd-desc { margin-top:80px; padding-top:40px; border-top:1px solid var(--border); }
        .pd-desc h3 { font-size:18px; font-weight:600; margin-bottom:16px; }
        .pd-desc p, .pd-desc div { font-size:14px; color:var(--text-light); line-height:1.8; max-width:600px; }
        .pd-app-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
        .pd-app-tag { padding:6px 16px; background:var(--orange-light); color:var(--orange); border-radius:20px; font-size:13px; font-weight:500; }
        .pd-contact { margin-top:40px; padding:24px; background:var(--bg); border-radius:12px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
        .pd-contact-text { font-size:14px; color:var(--text-light); }
        .pd-contact-text strong { color:var(--text); font-weight:600; }
        .pd-contact-btn { padding:10px 24px; background:var(--orange); color:#fff; border-radius:50px; font-size:13px; font-weight:500; text-decoration:none; transition:all .3s; }
        .pd-contact-btn:hover { background:#e55e00; }
        .pd-notfound { text-align:center; padding:120px 20px; }
        .pd-notfound h2 { font-size:28px; margin-bottom:16px; }
        .pd-notfound p { color:var(--text-light); margin-bottom:24px; }
        .pd-notfound a { color:var(--orange); font-weight:500; }
        .pd-loading { text-align:center; padding:120px 20px; color:var(--text-light); }
        .pd-features { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px; }
        .pd-feature { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--bg); border-radius:8px; font-size:13px; color:var(--text); }
        .pd-feature-icon { width:20px; text-align:center; color:var(--orange); }
        @media (max-width:768px) {
            .pd-layout { grid-template-columns:1fr; gap:40px; }
            .pd-visual { position:static; }
            .pd-visual-box { max-width:100%; }
            .pd-specs { grid-template-columns:1fr; }
            .pd-btns { flex-direction:column; }
            .pd-features { grid-template-columns:1fr; }
        }
    </style>
</head>

    <script>
        // ===== Product Loading =====
        let cart = JSON.parse(localStorage.getItem('wanhong_cart') || '[]');
        let currentProduct = null;

        function saveCart() {
            localStorage.setItem('wanhong_cart', JSON.stringify(cart));
            updateCartBadge();
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartBadge');
            if (badge) {
                const total = cart.reduce((s, i) => s + i.qty, 0);
                badge.textContent = total;
                badge.style.display = total > 0 ? 'flex' : 'none';
            }
        }

        function showMsg(text) {
            let el = document.getElementById('pdSuccess');
            if (!el) {
                const info = document.querySelector('.pd-info');
                if (!info) return;
                el = document.createElement('div');
                el.id = 'pdSuccess';
                el.style.cssText = 'display:none;background:#00A65A;color:#fff;padding:14px 20px;border-radius:8px;margin-bottom:20px;font-size:14px;text-align:center;';
                info.prepend(el);
            }
            el.style.display = 'block';
            el.textContent = '鉁?' + text;
            el.style.background = '#00A65A';
            clearTimeout(el._timer);
            el._timer = setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        function buyNow() {
            if (!currentProduct) return;
            const qty = parseInt(document.getElementById('pdQty')?.value) || 1;
            cart.push({ id: currentProduct.id, name: currentProduct.name, price: currentProduct.price, qty });
            saveCart();
            showMsg('宸叉坊鍔?' + qty + ' 浠讹紝鍗冲皢璺宠浆缁撶畻...');
            setTimeout(() => { window.location.href = 'cart.html'; }, 800);
        }

        function addToCart() {
            if (!currentProduct) return;
            const qty = parseInt(document.getElementById('pdQty')?.value) || 1;
            cart.push({ id: currentProduct.id, name: currentProduct.name, price: currentProduct.price, qty });
            saveCart();
            showMsg('宸叉坊鍔?' + qty + ' 浠?' + currentProduct.name + ' 鍒拌喘鐗╄溅');
        }

        async function loadProduct() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                document.getElementById('pdContent').innerHTML = `
                    <div class="pd-notfound">
                        <h2>鏈寚瀹氫骇鍝?/h2>
                        <p>璇蜂粠浜у搧鍒楄〃涓€夋嫨涓€涓骇鍝?/p>
                        <a href="index.html#products">鈫?鍓嶅線浜у搧鍒楄〃</a>
                    </div>`;
                return;
            }

            try {
                const resp = await fetch('data/products.json?_=' + Date.now());
                const data = await resp.json();
                const product = (data.products || []).find(p => p.id === id);

                if (!product) {
                    document.getElementById('pdContent').innerHTML = `
                        <div class="pd-notfound">
                            <h2>浜у搧鏈壘鍒?/h2>
                            <p>浜у搧 "${id}" 涓嶅瓨鍦?/p>
                            <a href="index.html#products">鈫?鏌ョ湅鎵€鏈変骇鍝?/a>
                        </div>`;
                    return;
                }

                currentProduct = product;
                renderProduct(product);
                document.title = product.name + ' 鈥?鎯犲窞甯備竾娉撶鎶€鏈夐檺鍏徃';
                updateCartBadge();
            } catch (e) {
                document.getElementById('pdContent').innerHTML = `
                    <div class="pd-notfound">
                        <h2>鍔犺浇澶辫触</h2>
                        <p>鏃犳硶鍔犺浇浜у搧鏁版嵁锛岃绋嶅悗閲嶈瘯</p>
                        <a href="index.html">鈫?杩斿洖棣栭〉</a>
                    </div>`;
            }
        }

        function renderProduct(p) {
            const hasFeatures = p.features && p.features.length > 0;
            const hasApps = p.applications && p.applications.length > 0;
            const specRows = (p.specList || []).map(s => `
                <div class="pd-spec">
                    <div class="pd-spec-label">${s.label}</div>
                    <div class="pd-spec-value">${s.value}</div>
                </div>
            `).join('');

            document.getElementById('pdContent').innerHTML = `
                <div class="pd-layout">
                    <div class="pd-visual">
                        <div class="pd-visual-box">
                            ${p.image
                                ? `<img src="${p.image}" alt="${p.name}">`
                                : `<div class="pd-visual-fallback">
                                    <div class="pd-v-model">${p.id.replace(/[^0-9a-zA-Z]/g,'')}</div>
                                    <div class="pd-v-cap">${p.subtitle || ''}</div>
                                </div>`
                            }
                        </div>
                    </div>
                    <div class="pd-info">
                        <span class="pd-tag">${p.tag ? '馃敟 ' + p.tag : ''}</span>
                        <h1 class="pd-title">${p.fullName || p.name}</h1>
                        <div class="pd-price">楼 ${p.price.toFixed(2)}</div>
                        <div class="pd-price-desc">${p.priceDesc || '鍗曚环 / 鍚◣鍚繍璐癸紝鎵归噺浠锋牸鍙﹁'}</div>

                        <div style="display:none;" id="pdSuccess"></div>

                        ${hasFeatures ? `
                        <div class="pd-features">
                            ${p.features.map(f => `<div class="pd-feature"><span class="pd-feature-icon">鉁?/span> ${f}</div>`).join('')}
                        </div>` : ''}

                        <div class="pd-specs">${specRows}</div>

                        ${hasApps ? `
                        <div class="pd-app-tags">
                            ${p.applications.map(a => `<span class="pd-app-tag">${a}</span>`).join('')}
                        </div>` : ''}

                        <div class="pd-divider"></div>

                        <div class="pd-qty">
                            <label>鏁伴噺</label>
                            <input type="number" id="pdQty" value="1" min="1" step="1">
                            <span>浠?/span>
                        </div>

                        <div class="pd-btns">
                            <button class="pd-btn-primary" onclick="buyNow()">绔嬪嵆璐拱</button>
                            <button class="pd-btn-secondary" onclick="addToCart()">鍔犲叆璐墿杞?/button>
                        </div>

                        <div class="pd-desc">
                            <h3>浜у搧鎻忚堪</h3>
                            ${p.fullDescription ? p.fullDescription : '<p>' + (p.description || '') + '</p>'}
                        </div>

                        <div class="pd-contact">
                            <div class="pd-contact-text">
                                鏈変换浣曠枒闂紵璇疯仈绯?<strong>寤栦竾娆ｏ紙鎬荤粡鐞嗭級</strong> 鈥?鎴戜滑灏嗗湪 24 灏忔椂鍐呭洖澶?                            </div>
                            <a href="tel:13682629862" class="pd-contact-btn">馃摓 13682629862</a>
                        </div>
                    </div>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', loadProduct);
    </script>
    <script src="js/main.js"></script>
