<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品详情 — 惠州市万鸿科技有限公司</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .pd-wrap { max-width:1000px; margin:120px auto 60px; padding:0 24px; }
        .pd-back { display:inline-flex; align-items:center; gap:6px; font-size:14px; color:var(--text-light); margin-bottom:32px; transition:color .3s; }
        .pd-back:hover { color:var(--orange); }
        .pd-layout { display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:start; }
        .pd-visual { position:sticky; top:100px; }
        .pd-visual-box {
            aspect-ratio:1; max-width:420px;
            background:linear-gradient(135deg,#f8f8f8,#e8e8e8); border-radius:16px;
            border:1px solid var(--border);
            display:flex; align-items:center; justify-content:center;
            box-shadow:var(--shadow); overflow:hidden;
        }
        .pd-visual-box img { width:100%; height:100%; object-fit:contain; border-radius:16px; }
        .pd-visual-box .pd-visual-fallback { text-align:center; }
        .pd-visual-box .pd-visual-fallback .pd-v-model { font-size:48px; font-weight:700; color:rgba(0,0,0,.08); font-family:var(--font-display); letter-spacing:-1px; }
        .pd-visual-box .pd-visual-fallback .pd-v-cap { font-size:16px; color:rgba(0,0,0,.15); font-weight:500; margin-top:4px; }
        .pd-tag { display:inline-block; font-size:11px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; color:var(--orange); margin-bottom:12px; }
        .pd-title { font-family:var(--font-display); font-size:clamp(24px,3vw,34px); font-weight:700; letter-spacing:-.5px; line-height:1.2; margin-bottom:20px; }
        .pd-price { font-size:32px; font-weight:700; color:var(--text); margin-bottom:4px; }
        .pd-price-desc { font-size:14px; color:var(--text-light); margin-bottom:24px; }
        .pd-divider { height:1px; background:var(--border); margin:24px 0; }
        .pd-specs { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:32px; }
        .pd-spec { padding:12px 16px; background:var(--bg); border-radius:8px; }
        .pd-spec-label { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-light); margin-bottom:2px; }
        .pd-spec-value { font-size:15px; font-weight:600; color:var(--text); }
        .pd-qty { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
        .pd-qty label { font-size:14px; color:var(--text-light); }
        .pd-qty input { width:100px; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:15px; text-align:center; outline:none; }
        .pd-qty input:focus { border-color:var(--orange); }
        .pd-qty span { font-size:13px; color:var(--text-light); }
        .pd-btns { display:flex; gap:12px; }
        .pd-btn-primary { flex:1; padding:14px; background:var(--orange); color:#fff; border:none; border-radius:50px; font-size:15px; font-weight:500; cursor:pointer; text-align:center; transition:all .3s; }
        .pd-btn-primary:hover { background:#e55e00; transform:scale(1.02); }
        .pd-btn-secondary { flex:1; padding:14px; background:#fff; color:var(--text); border:1.5px solid var(--border); border-radius:50px; font-size:15px; font-weight:500; cursor:pointer; text-align:center; transition:all .3s; text-decoration:none; display:flex; align-items:center; justify-content:center; }
        .pd-btn-secondary:hover { border-color:var(--orange); color:var(--orange); }
        .pd-success { display:none; background:#00A65A; color:#fff; padding:14px 20px; border-radius:8px; margin-bottom:20px; font-size:14px; text-align:center; }
        .pd-desc { margin-top:80px; padding-top:40px; border-top:1px solid var(--border); }
        .pd-desc h3 { font-size:18px; font-weight:600; margin-bottom:16px; }
        .pd-desc p, .pd-desc div { font-size:14px; color:var(--text-light); line-height:1.8; max-width:600px; }
        .pd-app-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
        .pd-app-tag { padding:6px 16px; background:var(--orange-light); color:var(--orange); border-radius:20px; font-size:13px; font-weight:500; }
        .pd-contact { margin-top:40px; padding:24px; background:var(--bg); border-radius:12px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
        .pd-contact-text { font-size:14px; color:var(--text-light); }
        .pd-contact-text strong { color:var(--text); font-weight:600; }
        .pd-contact-btn { padding:10px 24px; background:var(--orange); color:#fff; border-radius:50px; font-size:13px; font-weight:500; text-decoration:none; transition:all .3s; }
        .pd-contact-btn:hover { background:#e55e00; }
        .pd-notfound { text-align:center; padding:120px 20px; }
        .pd-notfound h2 { font-size:28px; margin-bottom:16px; }
        .pd-notfound p { color:var(--text-light); margin-bottom:24px; }
        .pd-notfound a { color:var(--orange); font-weight:500; }
        .pd-loading { text-align:center; padding:120px 20px; color:var(--text-light); }
        .pd-features { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px; }
        .pd-feature { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--bg); border-radius:8px; font-size:13px; color:var(--text); }
        .pd-feature-icon { width:20px; text-align:center; color:var(--orange); }
        @media (max-width:768px) {
            .pd-layout { grid-template-columns:1fr; gap:40px; }
            .pd-visual { position:static; }
            .pd-visual-box { max-width:100%; }
            .pd-specs { grid-template-columns:1fr; }
            .pd-btns { flex-direction:column; }
            .pd-features { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>

    <!-- ===== Navigation ===== -->
    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <img src="assets/logo.png" alt="万鸿科技" class="nav-logo-img">
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="index.html#products">产品</a></li>
                <li><a href="index.html#about">关于</a></li>
                <li><a href="index.html#contact">联系</a></li>
            </ul>
            <div class="nav-actions">
                <a href="cart.html" class="nav-action" style="position:relative;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                    <span id="cartBadge" style="position:absolute;top:-6px;right:-8px;background:#FF6A00;color:#fff;font-size:10px;font-weight:600;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;">0</span>
                </a>
                <a href="tel:13682629862" class="nav-action" style="font-size:13px;color:var(--orange);font-weight:500;">📞 13682629862</a>
            </div>
            <button class="nav-toggle" aria-label="菜单">
                <span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- ===== Product Detail ===== -->
    <div class="pd-wrap" id="pdWrap">
        <a href="index.html" class="pd-back">← 返回首页</a>
        <div id="pdContent">
            <div class="pd-loading">加载产品信息中...</div>
        </div>
    </div>

    <!-- ===== Footer ===== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-brand">
                    <img src="assets/logo.png" alt="万鸿科技" class="footer-logo-img">
                    <p>专注电子烟电池研发制造</p>
                </div>
                <div class="footer-col">
                    <h5>产品</h5>
                    <ul>
                        <li><a href="product.html?id=18400">18400 电子烟电池</a></li>
                        <li><a href="product.html?id=18650">18650 高倍率电池</a></li>
                        <li><a href="product.html?id=18350-1000">18350 高容量电池</a></li>
                    </ul>
                </div>
                <div class="footer-col">
                    <h5>联系</h5>
                    <ul>
                        <li>📞 13682629862</li>
                        <li>廖万欣（总经理）</li>
                        <li>✉️ info@wanhong-tech.com</li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 惠州市万鸿科技有限公司</p>
            </div>
        </div>
    </footer>

    <script>
        // ===== Product Loading =====
        let cart = JSON.parse(localStorage.getItem('wanhong_cart') || '[]');
        let currentProduct = null;

        function saveCart() {
            localStorage.setItem('wanhong_cart', JSON.stringify(cart));
            updateCartBadge();
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartBadge');
            if (badge) {
                const total = cart.reduce((s, i) => s + i.qty, 0);
                badge.textContent = total;
                badge.style.display = total > 0 ? 'flex' : 'none';
            }
        }

        function showMsg(text) {
            let el = document.getElementById('pdSuccess');
            if (!el) {
                const info = document.querySelector('.pd-info');
                if (!info) return;
                el = document.createElement('div');
                el.id = 'pdSuccess';
                el.style.cssText = 'display:none;background:#00A65A;color:#fff;padding:14px 20px;border-radius:8px;margin-bottom:20px;font-size:14px;text-align:center;';
                info.prepend(el);
            }
            el.style.display = 'block';
            el.textContent = '✓ ' + text;
            el.style.background = '#00A65A';
            clearTimeout(el._timer);
            el._timer = setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        function buyNow() {
            if (!currentProduct) return;
            const qty = parseInt(document.getElementById('pdQty')?.value) || 1;
            const total = currentProduct.price * qty;

            // Show checkout modal directly
            const formHtml = `
                <div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;" id="checkoutModal" onclick="if(event.target===this)this.remove()">
                <div style="background:#fff;border-radius:16px;padding:32px;width:480px;max-width:90vw;max-height:90vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,.3);">
                    <h3 style="font-size:20px;margin-bottom:4px;">📋 确认订单</h3>
                    <p style="font-size:14px;color:#888;margin-bottom:20px;">
                        <strong>${currentProduct.name}</strong> × ${qty} 件<br>
                        合计: <strong style="color:#FF6A00;font-size:22px;">¥ ${total.toFixed(2)}</strong>
                    </p>
                    <div style="display:flex;flex-direction:column;gap:12px;">
                        <div><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px;">收货人姓名 *</label><input id="co_name" placeholder="请输入收货人姓名" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none;" onfocus="this.style.borderColor='#FF6A00'" onblur="this.style.borderColor='#ddd'"></div>
                        <div><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px;">手机号码 *</label><input id="co_phone" type="tel" placeholder="请输入手机号码" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none;" onfocus="this.style.borderColor='#FF6A00'" onblur="this.style.borderColor='#ddd'"></div>
                        <div><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px;">收货地址 *</label><input id="co_address" placeholder="省/市/区/详细地址" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none;" onfocus="this.style.borderColor='#FF6A00'" onblur="this.style.borderColor='#ddd'"></div>
                        <div><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px;">公司名称</label><input id="co_company" placeholder="选填" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none;" onfocus="this.style.borderColor='#FF6A00'" onblur="this.style.borderColor='#ddd'"></div>
                        <div><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px;">电子邮箱</label><input id="co_email" type="email" placeholder="选填" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none;" onfocus="this.style.borderColor='#FF6A00'" onblur="this.style.borderColor='#ddd'"></div>
                        <div><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px;">备注留言</label><textarea id="co_msg" rows="2" placeholder="如有特殊需求请在此留言" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;resize:vertical;outline:none;" onfocus="this.style.borderColor='#FF6A00'" onblur="this.style.borderColor='#ddd'"></textarea></div>
                    </div>
                    <div style="display:flex;gap:10px;margin-top:20px;">
                        <button onclick="document.getElementById('checkoutModal').remove()" style="flex:1;padding:12px;background:#fff;border:1.5px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer;">取消</button>
                        <button onclick="submitBuyNow(${total}, ${qty})" style="flex:1;padding:12px;background:#FF6A00;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;">提交订单并付款</button>
                    </div>
                </div></div>`;
            document.body.insertAdjacentHTML('beforeend', formHtml);
        }

        async function submitBuyNow(total, qty) {
            const name = document.getElementById('co_name').value.trim();
            const phone = document.getElementById('co_phone').value.trim();
            const address = document.getElementById('co_address').value.trim();
            if (!name || !phone) { alert('请填写收货人姓名和手机号码'); return; }
            if (!address) { alert('请填写收货地址'); return; }

            const order = {
                customerName: name,
                phone: phone,
                address: address,
                company: document.getElementById('co_company').value.trim(),
                email: document.getElementById('co_email').value.trim(),
                productId: currentProduct.id || '',
                productName: currentProduct.name || '',
                quantity: qty,
                totalAmount: total,
                message: document.getElementById('co_msg').value.trim()
            };

            try {
                const resp = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(order)
                });
                if (resp.ok) {
                    document.getElementById('checkoutModal').remove();
                    showPaymentModal(total);
                } else {
                    alert('提交失败，请稍后重试。\n也可直接致电: 13682629862');
                }
            } catch(e) {
                // Offline fallback: save locally
                try {
                    localStorage.setItem('wanhong_last_order', JSON.stringify(order));
                    document.getElementById('checkoutModal').remove();
                    showPaymentModal(total);
                } catch(e2) {
                    alert('提交失败，请直接致电: 13682629862');
                }
            }
        }

        async function showPaymentModal(total) {
            let payment = null;
            try {
                const resp = await fetch('/api/payment');
                if (resp.ok) payment = await resp.json();
            } catch(e) {}

            if (!payment || (!payment.bank.enabled && !payment.wechat.enabled && !payment.alipay.enabled)) {
                alert('✅ 订单已提交！\n\n我们会尽快与您联系确认。\n电话: 13682629862');
                return;
            }

            let bankHtml = '', wechatHtml = '', alipayHtml = '';

            if (payment.bank && payment.bank.enabled && payment.bank.accountNumber) {
                bankHtml = `
                <div style="background:#f9f9f9;border-radius:10px;padding:16px;margin-bottom:12px;">
                    <h5 style="margin:0 0 10px;font-size:15px;">🏦 银行转账</h5>
                    <div style="font-size:13px;line-height:2;">
                        <div>户名: <strong>${payment.bank.accountName}</strong></div>
                        <div>账号: <strong style="color:#FF6A00;font-size:15px;">${payment.bank.accountNumber}</strong></div>
                        ${payment.bank.bankName ? `<div>开户行: ${payment.bank.bankName}</div>` : ''}
                    </div>
                </div>`;
            }
            if (payment.wechat && payment.wechat.enabled && payment.wechat.qrImage) {
                wechatHtml = `
                <div style="background:#f9f9f9;border-radius:10px;padding:16px;margin-bottom:12px;text-align:center;">
                    <h5 style="margin:0 0 10px;font-size:15px;">💬 微信扫码支付</h5>
                    <img src="/${payment.wechat.qrImage}" alt="微信收款码" style="width:200px;height:200px;object-fit:contain;border-radius:8px;border:1px solid #ddd;">
                    <div style="font-size:12px;color:#888;margin-top:6px;">请使用微信扫一扫</div>
                </div>`;
            }
            if (payment.alipay && payment.alipay.enabled && payment.alipay.qrImage) {
                alipayHtml = `
                <div style="background:#f9f9f9;border-radius:10px;padding:16px;margin-bottom:12px;text-align:center;">
                    <h5 style="margin:0 0 10px;font-size:15px;">🧧 支付宝扫码支付</h5>
                    <img src="/${payment.alipay.qrImage}" alt="支付宝收款码" style="width:200px;height:200px;object-fit:contain;border-radius:8px;border:1px solid #ddd;">
                    <div style="font-size:12px;color:#888;margin-top:6px;">请使用支付宝扫一扫</div>
                </div>`;
            }

            const payHtml = `
                <div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;" id="paymentModal" onclick="if(event.target===this)this.remove()">
                <div style="background:#fff;border-radius:16px;padding:32px;width:480px;max-width:90vw;max-height:90vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,.3);">
                    <div style="text-align:center;font-size:48px;margin-bottom:8px;">✅</div>
                    <h3 style="font-size:20px;margin-bottom:4px;text-align:center;">订单已提交</h3>
                    <p style="font-size:14px;color:#888;margin-bottom:8px;text-align:center;">请选择以下方式完成支付</p>
                    <p style="font-size:28px;font-weight:700;color:#FF6A00;margin-bottom:24px;text-align:center;">应付: ¥ ${total.toFixed(2)}</p>
                    ${bankHtml}
                    ${wechatHtml}
                    ${alipayHtml}
                    <div style="background:#fff5eb;border-radius:10px;padding:14px;text-align:center;margin-bottom:16px;">
                        <div style="font-size:13px;color:#555;">支付完成后请联系确认订单</div>
                        <div style="font-size:18px;font-weight:700;color:#FF6A00;margin-top:6px;">📞 13682629862</div>
                        <div style="font-size:12px;color:#888;">廖万欣（总经理）</div>
                    </div>
                    <button onclick="document.getElementById('paymentModal').remove()" style="width:100%;padding:12px;background:#FF6A00;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;">我知道了</button>
                </div></div>`;
            document.body.insertAdjacentHTML('beforeend', payHtml);
        }

        function addToCart() {
            if (!currentProduct) return;
            const qty = parseInt(document.getElementById('pdQty')?.value) || 1;
            cart.push({ id: currentProduct.id, name: currentProduct.name, price: currentProduct.price, qty });
            saveCart();
            showMsg('已添加 ' + qty + ' 件 ' + currentProduct.name + ' 到购物车');
        }

        async function loadProduct() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                document.getElementById('pdContent').innerHTML = `
                    <div class="pd-notfound">
                        <h2>未指定产品</h2>
                        <p>请从产品列表中选择一个产品</p>
                        <a href="index.html#products">→ 前往产品列表</a>
                    </div>`;
                return;
            }

            try {
                const resp = await fetch('data/products.json?_=' + Date.now());
                const data = await resp.json();
                const product = (data.products || []).find(p => p.id === id);

                if (!product) {
                    document.getElementById('pdContent').innerHTML = `
                        <div class="pd-notfound">
                            <h2>产品未找到</h2>
                            <p>产品 "${id}" 不存在</p>
                            <a href="index.html#products">→ 查看所有产品</a>
                        </div>`;
                    return;
                }

                currentProduct = product;
                renderProduct(product);
                document.title = product.name + ' — 惠州市万鸿科技有限公司';
                updateCartBadge();
            } catch (e) {
                document.getElementById('pdContent').innerHTML = `
                    <div class="pd-notfound">
                        <h2>加载失败</h2>
                        <p>无法加载产品数据，请稍后重试</p>
                        <a href="index.html">← 返回首页</a>
                    </div>`;
            }
        }

        function renderProduct(p) {
            const hasFeatures = p.features && p.features.length > 0;
            const hasApps = p.applications && p.applications.length > 0;
            const specRows = (p.specList || []).map(s => `
                <div class="pd-spec">
                    <div class="pd-spec-label">${s.label}</div>
                    <div class="pd-spec-value">${s.value}</div>
                </div>
            `).join('');

            document.getElementById('pdContent').innerHTML = `
                <div class="pd-layout">
                    <div class="pd-visual">
                        <div class="pd-visual-box">
                            ${p.image
                                ? `<img src="${p.image}" alt="${p.name}">`
                                : `<div class="pd-visual-fallback">
                                    <div class="pd-v-model">${p.id.replace(/[^0-9a-zA-Z]/g,'')}</div>
                                    <div class="pd-v-cap">${p.subtitle || ''}</div>
                                </div>`
                            }
                        </div>
                    </div>
                    <div class="pd-info">
                        <span class="pd-tag">${p.tag ? '🔥 ' + p.tag : ''}</span>
                        <h1 class="pd-title">${p.fullName || p.name}</h1>
                        <div class="pd-price">¥ ${p.price.toFixed(2)}</div>
                        <div class="pd-price-desc">${p.priceDesc || '单价 / 含税含运费，批量价格另议'}</div>

                        <div style="display:none;" id="pdSuccess"></div>

                        ${hasFeatures ? `
                        <div class="pd-features">
                            ${p.features.map(f => `<div class="pd-feature"><span class="pd-feature-icon">✓</span> ${f}</div>`).join('')}
                        </div>` : ''}

                        <div class="pd-specs">${specRows}</div>

                        ${hasApps ? `
                        <div class="pd-app-tags">
                            ${p.applications.map(a => `<span class="pd-app-tag">${a}</span>`).join('')}
                        </div>` : ''}

                        <div class="pd-divider"></div>

                        <div class="pd-qty">
                            <label>数量</label>
                            <input type="number" id="pdQty" value="1" min="1" step="1">
                            <span>件</span>
                        </div>

                        <div class="pd-btns">
                            <button class="pd-btn-primary" onclick="buyNow()">立即购买</button>
                            <button class="pd-btn-secondary" onclick="addToCart()">加入购物车</button>
                        </div>

                        <div class="pd-desc">
                            <h3>产品描述</h3>
                            ${p.fullDescription ? p.fullDescription : '<p>' + (p.description || '') + '</p>'}
                        </div>

                        <div class="pd-contact">
                            <div class="pd-contact-text">
                                有任何疑问？请联系 <strong>廖万欣（总经理）</strong> — 我们将在 24 小时内回复
                            </div>
                            <a href="tel:13682629862" class="pd-contact-btn">📞 13682629862</a>
                        </div>
                    </div>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', loadProduct);
    </script>
    <script src="js/main.js"></script>
</body>
</html>
