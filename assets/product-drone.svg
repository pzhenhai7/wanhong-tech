<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#ffffff"/>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eef5"/>
      <stop offset="100%" style="stop-color:#d0dce8"/>
    </linearGradient>
  </defs>
  <!-- Drone battery body (rectangular, LiPo style) -->
  <rect x="100" y="80" width="200" height="240" rx="12" ry="12" fill="#222" stroke="#aaa" stroke-width="2"/>
  <rect x="120" y="100" width="160" height="180" rx="6" ry="6" fill="url(#g1)"/>
  <!-- Connection wires -->
  <line x1="100" y1="120" x2="85" y2="110" stroke="#FF6A00" stroke-width="3"/>
  <line x1="100" y1="135" x2="85" y2="125" stroke="#222" stroke-width="3"/>
  <circle cx="85" cy="110" r="4" fill="#FF6A00"/>
  <circle cx="85" cy="125" r="4" fill="#222"/>
  <!-- BMS label -->
  <rect x="155" y="220" width="90" height="24" rx="4" ry="4" fill="#FF6A00"/>
  <text x="200" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">BMS</text>
  <text x="200" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#333">11.4V 4200mAh</text>
  <text x="200" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">3S 智能电池</text>
  <!-- Model text -->
  <text x="200" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#333">无人机智能电池</text>
</svg>