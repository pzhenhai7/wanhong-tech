<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#ffffff"/>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0eb"/>
      <stop offset="100%" style="stop-color:#e8e0d8"/>
    </linearGradient>
  </defs>
  <!-- Battery body -->
  <rect x="135" y="60" width="130" height="280" rx="18" ry="18" fill="#444" stroke="#bbb" stroke-width="2"/>
  <rect x="158" y="85" width="84" height="200" rx="4" ry="4" fill="url(#g1)"/>
  <!-- Positive terminal -->
  <rect x="178" y="45" width="44" height="18" rx="4" ry="4" fill="#777"/>
  <!-- Voltage text on battery -->
  <text x="200" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#333">3.7V</text>
  <text x="200" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">800mAh</text>
  <text x="200" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">2.96Wh</text>
  <!-- Model text -->
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#333">18300</text>
  <text x="200" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#999">800mAh 电子烟电池</text>
</svg>