<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#ffffff"/>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
  </defs>
  <!-- Battery body -->
  <rect x="140" y="55" width="120" height="290" rx="14" ry="14" fill="#333" stroke="#ccc" stroke-width="2"/>
  <rect x="162" y="80" width="76" height="200" rx="4" ry="4" fill="url(#g1)"/>
  <!-- Positive terminal -->
  <rect x="182" y="40" width="36" height="18" rx="3" ry="3" fill="#666"/>
  <!-- LG Logo area -->
  <rect x="170" y="295" width="60" height="24" rx="4" ry="4" fill="#FF6A00"/>
  <text x="200" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">LG</text>
  <!-- Model text -->
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#333">LG 17350</text>
  <text x="200" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#999">850mAh · 韩国LG电芯</text>
</svg>