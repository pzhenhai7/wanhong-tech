<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 — 惠州市万泓科技有限公司</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-wrap { max-width:800px; margin:120px auto 60px; padding:0 24px; }
        .cart-back { display:inline-flex; align-items:center; gap:6px; font-size:14px; color:var(--text-light); margin-bottom:32px; transition:color .3s; }
        .cart-back:hover { color:var(--orange); }
        .cart-title { font-family:var(--font-display); font-size:clamp(24px,3vw,32px); font-weight:700; margin-bottom:32px; }
        .cart-empty { text-align:center; padding:80px 20px; }
        .cart-empty svg { width:64px; height:64px; color:var(--border); margin-bottom:16px; }
        .cart-empty p { font-size:16px; color:var(--text-light); margin-bottom:24px; }
        .cart-empty a { display:inline-block; padding:12px 32px; background:var(--orange); color:#fff; border-radius:50px; font-size:14px; font-weight:500; }
        .cart-items { display:flex; flex-direction:column; gap:16px; }
        .cart-item { display:flex; align-items:center; gap:16px; padding:20px; background:#fff; border-radius:12px; border:1px solid var(--border); }
        .cart-item-img { width:80px; height:80px; border-radius:8px; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; color:rgba(0,0,0,.12); flex-shrink:0; }
        .cart-item-info { flex:1; min-width:0; }
        .cart-item-name { font-size:15px; font-weight:600; margin-bottom:4px; }
        .cart-item-price { font-size:14px; color:var(--orange); font-weight:500; }
        .cart-item-qty { display:flex; align-items:center; gap:8px; }
        .cart-item-qty input { width:60px; padding:4px 8px; border:1px solid var(--border); border-radius:6px; font-size:14px; text-align:center; outline:none; }
        .cart-item-qty input:focus { border-color:var(--orange); }
        .cart-item-remove { background:none; border:none; color:var(--text-light); font-size:18px; cursor:pointer; padding:4px; transition:color .3s; }
        .cart-item-remove:hover { color:#e55e00; }
        .cart-summary { margin-top:24px; padding:24px; background:#fff; border-radius:12px; border:1px solid var(--border); }
        .cart-summary-row { display:flex; justify-content:space-between; font-size:15px; padding:8px 0; }
        .cart-summary-row.total { font-size:20px; font-weight:700; border-top:1px solid var(--border); padding-top:16px; margin-top:8px; }
        .cart-checkout { width:100%; padding:16px; background:var(--orange); color:#fff; border:none; border-radius:50px; font-size:16px; font-weight:600; cursor:pointer; margin-top:20px; transition:all .3s; }
        .cart-checkout:hover { background:#e55e00; }
        .cart-clear { display:inline-block; margin-top:12px; font-size:13px; color:var(--text-light); cursor:pointer; transition:color .3s; }
        .cart-clear:hover { color:#e55e00; }
        @media (max-width:600px) {
            .cart-item { flex-wrap:wrap; }
            .cart-item-img { width:60px; height:60px; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <img src="assets/logo.png" alt="万泓科技" class="nav-logo-img">
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="index.html#products">产品</a></li>
                <li><a href="index.html#about">关于</a></li>
                <li><a href="index.html#contact">联系</a></li>
            </ul>
            <div class="nav-actions">
                <a href="cart.html" class="nav-action" style="position:relative;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                    <span id="cartBadge" style="position:absolute;top:-6px;right:-8px;background:#FF6A00;color:#fff;font-size:10px;font-weight:600;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;">0</span>
                </a>
                <a href="tel:13682629862" class="nav-action" style="font-size:13px;color:var(--orange);font-weight:500;">📞 13682629862</a>
            </div>
            <button class="nav-toggle" aria-label="菜单">
                <span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- Cart -->
    <div class="cart-wrap">
        <a href="javascript:history.back()" class="cart-back">← 继续购物</a>
        <h1 class="cart-title">购物车</h1>

        <div id="cartEmpty" class="cart-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            <p>购物车是空的</p>
            <a href="index.html">去选购产品</a>
        </div>

        <div id="cartContent" style="display:none;">
            <div class="cart-items" id="cartItems"></div>

            <div class="cart-summary">
                <div class="cart-summary-row">
                    <span>商品总额</span>
                    <span id="cartSubtotal">¥ 0.00</span>
                </div>
                <div class="cart-summary-row total">
                    <span>合计</span>
                    <span id="cartTotal">¥ 0.00</span>
                </div>
                <button class="cart-checkout" onclick="checkout()">提交订单</button>
                <div style="text-align:center;">
                    <span class="cart-clear" onclick="clearCart()">清空购物车</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-brand">
                    <img src="assets/logo.png" alt="万泓科技" class="footer-logo-img">
                    <p>专注电子烟电池 · 无人机电池研发制造</p>
                </div>
                <div class="footer-col">
                    <h5>产品</h5>
                    <ul>
                        <li><a href="product-18400.html">18400 电子烟电池</a></li>
                    </ul>
                </div>
                <div class="footer-col">
                    <h5>联系</h5>
                    <ul>
                        <li>📞 13682629862</li>
                        <li>👤 廖万欣（总经理）</li>
                        <li>📧 info@wanhong-tech.com</li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 惠州市万泓科技有限公司</p>
            </div>
        </div>
    </footer>

    <script>
        const PRODUCTS = {
            '18400': { name: '18400 1100mAh 电子烟电池', price: 13.00 }
        };

        function getCart() {
            return JSON.parse(localStorage.getItem('wanhong_cart') || '[]');
        }

        function saveCart(cart) {
            localStorage.setItem('wanhong_cart', JSON.stringify(cart));
        }

        function renderCart() {
            const cart = getCart();
            const empty = document.getElementById('cartEmpty');
            const content = document.getElementById('cartContent');
            const items = document.getElementById('cartItems');

            if (cart.length === 0) {
                empty.style.display = 'block';
                content.style.display = 'none';
                updateBadge(0);
                return;
            }

            empty.style.display = 'none';
            content.style.display = 'block';

            items.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <div class="cart-item-img">${item.id}</div>
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">¥ ${item.price.toFixed(2)}</div>
                    </div>
                    <div class="cart-item-qty">
                        <input type="number" value="${item.qty}" min="1" onchange="updateQty(${i}, this.value)">
                    </div>
                    <button class="cart-item-remove" onclick="removeItem(${i})">✕</button>
                </div>
            `).join('');

            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            document.getElementById('cartSubtotal').textContent = '¥ ' + subtotal.toFixed(2);
            document.getElementById('cartTotal').textContent = '¥ ' + subtotal.toFixed(2);
            updateBadge(cart.reduce((s, i) => s + i.qty, 0));
        }

        function updateQty(index, val) {
            const cart = getCart();
            const qty = parseInt(val) || 1;
            cart[index].qty = qty;
            saveCart(cart);
            renderCart();
        }

        function removeItem(index) {
            const cart = getCart();
            cart.splice(index, 1);
            saveCart(cart);
            renderCart();
        }

        function clearCart() {
            if (confirm('确定清空购物车？')) {
                saveCart([]);
                renderCart();
            }
        }

        function checkout() {
            const cart = getCart();
            if (cart.length === 0) return;
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            alert('订单已提交！\n\n合计: ¥ ' + total.toFixed(2) + '\n\n我们将尽快与您联系确认。\n联系电话: 13682629862');
            saveCart([]);
            renderCart();
        }

        function updateBadge(n) {
            const badge = document.getElementById('cartBadge');
            if (badge) {
                badge.textContent = n;
                badge.style.display = n > 0 ? 'flex' : 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
    <script src="js/main.js"></script>
</body>
</html>
