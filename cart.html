<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 — 惠州市万鸿科技有限公司</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-wrap { max-width:800px; margin:120px auto 60px; padding:0 24px; }
        .cart-back { display:inline-flex; align-items:center; gap:6px; font-size:14px; color:var(--text-light); margin-bottom:32px; transition:color .3s; }
        .cart-back:hover { color:var(--orange); }
        .cart-title { font-family:var(--font-display); font-size:clamp(24px,3vw,32px); font-weight:700; margin-bottom:32px; }
        .cart-empty { text-align:center; padding:80px 20px; }
        .cart-empty svg { width:64px; height:64px; color:var(--border); margin-bottom:16px; }
        .cart-empty p { font-size:16px; color:var(--text-light); margin-bottom:24px; }
        .cart-empty a { display:inline-block; padding:12px 32px; background:var(--orange); color:#fff; border-radius:50px; font-size:14px; font-weight:500; }
        .cart-items { display:flex; flex-direction:column; gap:16px; }
        .cart-item { display:flex; align-items:center; gap:16px; padding:20px; background:#fff; border-radius:12px; border:1px solid var(--border); }
        .cart-item-img { width:80px; height:80px; border-radius:8px; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; color:rgba(0,0,0,.12); flex-shrink:0; }
        .cart-item-info { flex:1; min-width:0; }
        .cart-item-name { font-size:15px; font-weight:600; margin-bottom:4px; }
        .cart-item-price { font-size:14px; color:var(--orange); font-weight:500; }
        .cart-item-qty { display:flex; align-items:center; gap:8px; }
        .cart-item-qty input { width:60px; padding:4px 8px; border:1px solid var(--border); border-radius:6px; font-size:14px; text-align:center; outline:none; }
        .cart-item-qty input:focus { border-color:var(--orange); }
        .cart-item-remove { background:none; border:none; color:var(--text-light); font-size:18px; cursor:pointer; padding:4px; transition:color .3s; }
        .cart-item-remove:hover { color:#e55e00; }
        .cart-summary { margin-top:24px; padding:24px; background:#fff; border-radius:12px; border:1px solid var(--border); }
        .cart-summary-row { display:flex; justify-content:space-between; font-size:15px; padding:8px 0; }
        .cart-summary-row.total { font-size:20px; font-weight:700; border-top:1px solid var(--border); padding-top:16px; margin-top:8px; }
        .cart-checkout { width:100%; padding:16px; background:var(--orange); color:#fff; border:none; border-radius:50px; font-size:16px; font-weight:600; cursor:pointer; margin-top:20px; transition:all .3s; }
        .cart-checkout:hover { background:#e55e00; }
        .cart-clear { display:inline-block; margin-top:12px; font-size:13px; color:var(--text-light); cursor:pointer; transition:color .3s; }
        .cart-clear:hover { color:#e55e00; }
        @media (max-width:600px) {
            .cart-item { flex-wrap:wrap; }
            .cart-item-img { width:60px; height:60px; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <img src="assets/logo.png" alt="万鸿科技" class="nav-logo-img">
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="index.html#products">产品</a></li>
                <li><a href="index.html#about">关于</a></li>
                <li><a href="index.html#contact">联系</a></li>
            </ul>
            <div class="nav-actions">
                <a href="cart.html" class="nav-action" style="position:relative;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                    <span id="cartBadge" style="position:absolute;top:-6px;right:-8px;background:#FF6A00;color:#fff;font-size:10px;font-weight:600;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;">0</span>
                </a>
                <a href="tel:13682629862" class="nav-action" style="font-size:13px;color:var(--orange);font-weight:500;">📞 13682629862</a>
            </div>
            <button class="nav-toggle" aria-label="菜单">
                <span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- Cart -->
    <div class="cart-wrap">
        <a href="javascript:history.back()" class="cart-back">← 继续购物</a>
        <h1 class="cart-title">购物车</h1>

        <div id="cartEmpty" class="cart-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            <p>购物车是空的</p>
            <a href="index.html">去选购产品</a>
        </div>

        <div id="cartContent" style="display:none;">
            <div class="cart-items" id="cartItems"></div>

            <div class="cart-summary">
                <div class="cart-summary-row">
                    <span>商品总额</span>
                    <span id="cartSubtotal">¥ 0.00</span>
                </div>
                <div class="cart-summary-row total">
                    <span>合计</span>
                    <span id="cartTotal">¥ 0.00</span>
                </div>
                <button class="cart-checkout" onclick="checkout()">提交订单</button>
                <div style="text-align:center;">
                    <span class="cart-clear" onclick="clearCart()">清空购物车</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-brand">
                    <img src="assets/logo.png" alt="万鸿科技" class="footer-logo-img">
                    <p>专注电子烟电池研发制造</p>
                </div>
                <div class="footer-col">
                    <h5>产品</h5>
                    <ul>
                        <li><a href="product.html?id=18400">18400 电子烟电池</a></li>
                    </ul>
                </div>
                <div class="footer-col">
                    <h5>联系</h5>
                    <ul>
                        <li>📞 13682629862</li>
                        <li>廖万欣（总经理）</li>
                        <li>✉️ info@wanhong-tech.com</li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 惠州市万鸿科技有限公司 — All Rights Reserved</p>
            </div>
        </div>
    </footer>

    <script>
        let ALL_PRODUCTS = {};

        async function loadAllProducts() {
            try {
                const resp = await fetch('data/products.json?_=' + Date.now());
                const data = await resp.json();
                (data.products || []).forEach(p => {
                    ALL_PRODUCTS[p.id] = { name: p.name, price: p.price };
                });
                renderCart();
            } catch(e) {
                renderCart();
            }
        }

        function getCart() {
            return JSON.parse(localStorage.getItem('wanhong_cart') || '[]');
        }

        function saveCart(cart) {
            localStorage.setItem('wanhong_cart', JSON.stringify(cart));
        }

        function renderCart() {
            const cart = getCart();
            const empty = document.getElementById('cartEmpty');
            const content = document.getElementById('cartContent');
            const items = document.getElementById('cartItems');

            if (cart.length === 0) {
                empty.style.display = 'block';
                content.style.display = 'none';
                updateBadge(0);
                return;
            }

            empty.style.display = 'none';
            content.style.display = 'block';

            items.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <div class="cart-item-img">${item.id}</div>
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">¥ ${item.price.toFixed(2)}</div>
                    </div>
                    <div class="cart-item-qty">
                        <input type="number" value="${item.qty}" min="1" onchange="updateQty(${i}, this.value)">
                    </div>
                    <button class="cart-item-remove" onclick="removeItem(${i})">✕</button>
                </div>
            `).join('');

            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            document.getElementById('cartSubtotal').textContent = '¥ ' + subtotal.toFixed(2);
            document.getElementById('cartTotal').textContent = '¥ ' + subtotal.toFixed(2);
            updateBadge(cart.reduce((s, i) => s + i.qty, 0));
        }

        function updateQty(index, val) {
            const cart = getCart();
            const qty = parseInt(val) || 1;
            cart[index].qty = qty;
            saveCart(cart);
            renderCart();
        }

        function removeItem(index) {
            const cart = getCart();
            cart.splice(index, 1);
            saveCart(cart);
            renderCart();
        }

        function clearCart() {
            if (confirm('确定清空购物车？')) {
                saveCart([]);
                renderCart();
            }
        }

        async function checkout() {
            const cart = getCart();
            if (cart.length === 0) return;
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);

            // Show order form with address fields
            const formHtml = `
                <div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;" id="checkoutModal" onclick="if(event.target===this)this.remove()">
                <div style="background:#fff;border-radius:16px;padding:32px;width:480px;max-width:90vw;max-height:90vh;overflow-y:auto;">
                    <h3 style="font-size:18px;margin-bottom:4px;">提交订单</h3>
                    <p style="font-size:14px;color:#888;margin-bottom:20px;">合计: <strong style="color:#FF6A00;font-size:20px;">¥ ${total.toFixed(2)}</strong></p>
                    <div style="display:flex;flex-direction:column;gap:12px;">
                        <div><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px;">收货人姓名 *</label><input id="co_name" placeholder="请输入收货人姓名" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;"></div>
                        <div><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px;">手机号码 *</label><input id="co_phone" type="tel" placeholder="请输入手机号码" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;"></div>
                        <div><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px;">收货地址 *</label><input id="co_address" placeholder="省/市/区/详细地址" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;"></div>
                        <div><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px;">公司名称</label><input id="co_company" placeholder="选填" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;"></div>
                        <div><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px;">电子邮箱</label><input id="co_email" type="email" placeholder="选填" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;"></div>
                        <div><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px;">备注</label><textarea id="co_msg" rows="2" placeholder="如有特殊需求请在此留言" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;resize:vertical;"></textarea></div>
                    </div>
                    <div style="display:flex;gap:10px;margin-top:20px;">
                        <button onclick="document.getElementById('checkoutModal').remove()" style="flex:1;padding:12px;background:#fff;border:1.5px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer;">取消</button>
                        <button onclick="submitOrder(${total})" style="flex:1;padding:12px;background:#FF6A00;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">提交订单</button>
                    </div>
                </div></div>`;
            document.body.insertAdjacentHTML('beforeend', formHtml);
        }

        async function submitOrder(total) {
            const name = document.getElementById('co_name').value.trim();
            const phone = document.getElementById('co_phone').value.trim();
            const address = document.getElementById('co_address').value.trim();
            if (!name || !phone) { alert('请填写收货人姓名和手机号码'); return; }
            if (!address) { alert('请填写收货地址'); return; }

            const cart = getCart();
            const firstItem = cart[0] || {};

            const order = {
                customerName: name,
                phone: phone,
                address: address,
                company: document.getElementById('co_company').value.trim(),
                email: document.getElementById('co_email').value.trim(),
                productId: firstItem.id || '',
                productName: firstItem.name || '',
                quantity: cart.reduce((s,i) => s + i.qty, 0),
                totalAmount: total,
                message: document.getElementById('co_msg').value.trim()
            };

            try {
                const resp = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(order)
                });
                if (resp.ok) {
                    document.getElementById('checkoutModal').remove();
                    saveCart([]);
                    renderCart();
                    // Load payment info and show
                    loadAndShowPayment(total);
                } else {
                    alert('提交失败，请稍后重试。\n也可直接致电: 13682629862');
                }
            } catch(e) {
                try {
                    localStorage.setItem('wanhong_last_order', JSON.stringify(order));
                    document.getElementById('checkoutModal').remove();
                    saveCart([]);
                    renderCart();
                    loadAndShowPayment(total);
                } catch(e2) {
                    alert('提交失败，请直接致电: 13682629862');
                }
            }
        }

        async function loadAndShowPayment(total) {
            let payment = null;
            try {
                const resp = await fetch('/api/payment');
                if (resp.ok) payment = await resp.json();
            } catch(e) {}

            if (!payment || (!payment.bank.enabled && !payment.wechat.enabled && !payment.alipay.enabled)) {
                alert('✅ 订单已提交！\n\n我们会尽快与您联系确认。\n电话: 13682629862');
                return;
            }

            // Build payment modal
            let bankHtml = '';
            let wechatHtml = '';
            let alipayHtml = '';

            if (payment.bank && payment.bank.enabled && payment.bank.accountNumber) {
                bankHtml = `
                <div style="background:#f9f9f9;border-radius:10px;padding:16px;margin-bottom:12px;">
                    <h5 style="margin:0 0 10px;font-size:15px;">🏦 银行转账</h5>
                    <div style="font-size:13px;line-height:2;">
                        <div>户名: <strong>${payment.bank.accountName}</strong></div>
                        <div>账号: <strong style="color:#FF6A00;font-size:14px;">${payment.bank.accountNumber}</strong></div>
                        ${payment.bank.bankName ? `<div>开户行: ${payment.bank.bankName}</div>` : ''}
                    </div>
                </div>`;
            }
            if (payment.wechat && payment.wechat.enabled && payment.wechat.qrImage) {
                wechatHtml = `
                <div style="background:#f9f9f9;border-radius:10px;padding:16px;margin-bottom:12px;text-align:center;">
                    <h5 style="margin:0 0 10px;font-size:15px;">💬 微信扫码支付</h5>
                    <img src="/${payment.wechat.qrImage}" alt="微信收款码" style="width:200px;height:200px;object-fit:contain;border-radius:8px;border:1px solid #ddd;">
                    <div style="font-size:12px;color:#888;margin-top:6px;">请使用微信扫一扫</div>
                </div>`;
            }
            if (payment.alipay && payment.alipay.enabled && payment.alipay.qrImage) {
                alipayHtml = `
                <div style="background:#f9f9f9;border-radius:10px;padding:16px;margin-bottom:12px;text-align:center;">
                    <h5 style="margin:0 0 10px;font-size:15px;">🧧 支付宝扫码支付</h5>
                    <img src="/${payment.alipay.qrImage}" alt="支付宝收款码" style="width:200px;height:200px;object-fit:contain;border-radius:8px;border:1px solid #ddd;">
                    <div style="font-size:12px;color:#888;margin-top:6px;">请使用支付宝扫一扫</div>
                </div>`;
            }

            const payHtml = `
                <div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;" id="paymentModal" onclick="if(event.target===this)this.remove()">
                <div style="background:#fff;border-radius:16px;padding:32px;width:480px;max-width:90vw;max-height:90vh;overflow-y:auto;">
                    <h3 style="font-size:20px;margin-bottom:4px;">✅ 订单已提交</h3>
                    <p style="font-size:14px;color:#888;margin-bottom:8px;">请选择以下方式完成支付</p>
                    <p style="font-size:24px;font-weight:700;color:#FF6A00;margin-bottom:24px;">应付: ¥ ${total.toFixed(2)}</p>
                    ${bankHtml}
                    ${wechatHtml}
                    ${alipayHtml}
                    <div style="background:#fff5eb;border-radius:8px;padding:12px;text-align:center;margin-bottom:16px;">
                        <div style="font-size:13px;color:#555;">支付完成后请联系确认</div>
                        <div style="font-size:16px;font-weight:700;color:#FF6A00;margin-top:4px;">📞 13682629862</div>
                        <div style="font-size:12px;color:#888;">廖万欣（总经理）</div>
                    </div>
                    <button onclick="document.getElementById('paymentModal').remove()" style="width:100%;padding:12px;background:#FF6A00;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;">我知道了</button>
                </div></div>`;
            document.body.insertAdjacentHTML('beforeend', payHtml);
        }

        function updateBadge(n) {
            const badge = document.getElementById('cartBadge');
            if (badge) {
                badge.textContent = n;
                badge.style.display = n > 0 ? 'flex' : 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', loadAllProducts);
    </script>
    <script src="js/main.js"></script>
</body>
</html>
