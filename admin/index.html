<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万鸿科技 — 后台管理</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div id="app">
    <!-- ===== Login Page ===== -->
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-logo-wrap">
                    <img src="../assets/logo.png" alt="万鸿科技" class="login-logo-img">
                </div>
                <h1 class="login-title">万鸿科技</h1>
                <p class="login-desc">惠州市万鸿科技有限公司</p>
                <p class="login-desc-en">Huizhou Wanhong Technology Co., Ltd</p>
                <div class="login-divider"></div>
                <p class="login-subtitle">后台管理系统</p>
            </div>

            <div class="login-tabs">
                <button class="login-tab active" data-tab="password">密码登录</button>
                <button class="login-tab" data-tab="token">Token登录</button>
            </div>

            <!-- Password Login -->
            <div id="loginPassword" class="login-form">
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" id="loginUser" placeholder="admin" class="form-input">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPass" placeholder="wanhong888" class="form-input" onkeydown="if(event.key==='Enter') loginWithPassword()">
                </div>
                <button class="login-btn" onclick="loginWithPassword()">登 录</button>
                <p class="login-hint">默认账号 admin / 密码 wanhong888</p>
            </div>

            <!-- Token Login -->
            <div id="loginToken" class="login-form" style="display:none;">
                <div class="form-group">
                    <label>GitHub Token</label>
                    <input type="password" id="loginTokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" class="form-input" onkeydown="if(event.key==='Enter') loginWithToken()">
                </div>
                <p class="login-hint" style="margin-bottom:12px;">可使用 GitHub Token 直接管理仓库并发布</p>
                <button class="login-btn" onclick="loginWithToken()">登 录</button>
            </div>

            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <!-- ===== Dashboard ===== -->
    <div id="dashboard" class="dashboard" style="display:none;">

        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <img src="../assets/logo.png" alt="万鸿科技" class="topbar-logo">
                <div class="topbar-title">
                    <span class="topbar-name">万鸿科技</span>
                    <span class="topbar-sub">后台管理系统</span>
                </div>
            </div>
            <div class="topbar-right">
                <span class="topbar-mode" id="loginModeBadge">本地模式</span>
                <button class="topbar-btn" onclick="syncFromGithub()" id="syncBtn">从 GitHub 同步</button>
                <button class="topbar-btn" onclick="publishToGithub()" id="publishBtn">发布到 GitHub</button>
                <button class="topbar-btn topbar-logout" onclick="logout()">退出</button>
            </div>
        </header>

        <!-- Status Bar -->
        <div class="status-bar" id="statusBar" style="display:none;">
            <span id="statusText"></span>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <nav class="sidebar">
                <button class="sidebar-item active" data-page="dashboard-overview">
                    <span>📊</span> 控制台
                </button>
                <button class="sidebar-item" data-page="products">
                    <span>📦</span> 产品管理
                </button>
                <button class="sidebar-item" data-page="orders">
                    <span>📋</span> 订单管理
                </button>
                <button class="sidebar-item" data-page="settings">
                    <span>⚙️</span> 网站设置
                </button>
            </nav>

            <!-- Content Area -->
            <div class="content-area">

                <!-- ===== Overview ===== -->
                <div id="page-dashboard-overview" class="page active">
                    <h1 class="page-title">控制台</h1>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-num" id="statProducts">0</div>
                            <div class="stat-label">产品总数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-num" id="statOrders">0</div>
                            <div class="stat-label">订单数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-num" id="statCategories">0</div>
                            <div class="stat-label">产品分类</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-num" id="statStatus" style="font-size:14px;">未发布</div>
                            <div class="stat-label">发布状态</div>
                        </div>
                    </div>

                    <div class="section-title">快速操作</div>
                    <div class="quick-actions">
                        <button class="quick-action" onclick="switchPage('products'); showAddProduct()">
                            <span class="qa-icon">+</span>
                            <span class="qa-text">添加产品</span>
                        </button>
                        <button class="quick-action" onclick="publishToGithub()">
                            <span class="qa-icon">↑</span>
                            <span class="qa-text">发布网站</span>
                        </button>
                        <button class="quick-action" onclick="window.open('https://pzhenhai7.github.io/wanhong-tech','_blank')">
                            <span class="qa-icon">◎</span>
                            <span class="qa-text">查看网站</span>
                        </button>
                    </div>
                </div>

                <!-- ===== Products ===== -->
                <div id="page-products" class="page">
                    <div class="page-header">
                        <h1 class="page-title">产品管理</h1>
                        <button class="btn btn-primary" onclick="showAddProduct()">+ 添加产品</button>
                    </div>

                    <div class="product-list" id="productList">
                        <!-- Rendered by JS -->
                    </div>

                    <!-- Add/Edit Product Modal -->
                    <div class="modal-overlay" id="productModal" style="display:none;" onclick="closeModalOnOverlay(event)">
                        <div class="modal">
                            <div class="modal-header">
                                <h3 id="modalTitle">添加产品</h3>
                                <button class="modal-close" onclick="closeModal()">✕</button>
                            </div>
                            <div class="modal-body">
                                <input type="hidden" id="editProductId">

                                <div class="form-row">
                                    <div class="form-group">
                                        <label>产品ID</label>
                                        <input type="text" id="pf_id" class="form-input" placeholder="例如: 18400">
                                    </div>
                                    <div class="form-group">
                                        <label>产品名称</label>
                                        <input type="text" id="pf_name" class="form-input" placeholder="例如: 18400 电子烟电池">
                                    </div>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label>副标题</label>
                                        <input type="text" id="pf_subtitle" class="form-input" placeholder="1100mAh / 钴+三元 / 5A放电">
                                    </div>
                                    <div class="form-group">
                                        <label>分类</label>
                                        <select id="pf_category" class="form-input">
                                            <option value="电子烟电池">电子烟电池</option>
                                            <option value="无人机电池">无人机电池</option>
                                            <option value="定制服务">定制服务</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label>价格 (元)</label>
                                        <input type="number" id="pf_price" class="form-input" step="0.01" placeholder="13.00">
                                    </div>
                                    <div class="form-group">
                                        <label>标签</label>
                                        <input type="text" id="pf_tag" class="form-input" placeholder="新品 / 热销 / 专业级">
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>产品描述</label>
                                    <textarea id="pf_description" class="form-input form-textarea" rows="3" placeholder="简短的产品描述"></textarea>
                                </div>

                                <div class="form-group">
                                    <label>详细描述</label>
                                    <textarea id="pf_fullDesc" class="form-input form-textarea" rows="4" placeholder="可使用 HTML 标签"></textarea>
                                </div>

                                <div class="form-group">
                                    <label>应用领域（逗号分隔）</label>
                                    <input type="text" id="pf_apps" class="form-input" placeholder="电子烟, POD小烟">
                                </div>

                                <div class="form-group">
                                    <label>产品图片路径</label>
                                    <div class="input-row">
                                        <input type="text" id="pf_image" class="form-input" placeholder="assets/product-xxx.jpg">
                                        <label class="checkbox-label">
                                            <input type="checkbox" id="pf_featured"> 首页推荐
                                        </label>
                                    </div>
                                </div>

                                <!-- Specs Editor -->
                                <div class="form-group">
                                    <label>规格参数</label>
                                    <div id="specEditor">
                                        <div class="spec-row">
                                            <input class="form-input spec-key" placeholder="参数名">
                                            <input class="form-input spec-val" placeholder="参数值">
                                            <button class="btn-sm btn-add" onclick="addSpecRow()">+</button>
                                        </div>
                                    </div>
                                </div>

                                <div id="modalError" class="form-error"></div>
                            </div>
                            <div class="modal-footer">
                                <button class="btn btn-cancel" onclick="closeModal()">取消</button>
                                <button class="btn btn-primary" onclick="saveProduct()">保存产品</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ===== Orders ===== -->
                <div id="page-orders" class="page">
                    <h1 class="page-title">订单管理</h1>
                    <div id="ordersContent">
                        <div class="empty-state">
                            <p>订单数据目前存储在用户浏览器本地，暂不支持云端同步。</p>
                        </div>
                    </div>
                </div>

                <!-- ===== Settings ===== -->
                <div id="page-settings" class="page">
                    <h1 class="page-title">网站设置</h1>

                    <div class="settings-section">
                        <h3>公司信息</h3>
                        <div class="form-group">
                            <label>公司名称</label>
                            <input type="text" id="sf_companyName" class="form-input">
                        </div>
                        <div class="form-group">
                            <label>联系电话</label>
                            <input type="text" id="sf_phone" class="form-input">
                        </div>
                        <div class="form-group">
                            <label>电子邮箱</label>
                            <input type="text" id="sf_email" class="form-input">
                        </div>
                        <div class="form-group">
                            <label>联系人</label>
                            <input type="text" id="sf_contactPerson" class="form-input">
                        </div>
                        <div class="form-group">
                            <label>公司地址</label>
                            <input type="text" id="sf_address" class="form-input">
                        </div>
                    </div>

                    <div class="settings-section">
                        <h3>GitHub 部署</h3>
                        <div class="form-group">
                            <label>GitHub Token</label>
                            <input type="password" id="sf_githubToken" class="form-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
                            <p class="form-hint">需要 repo 权限，用于自动发布到 GitHub Pages</p>
                        </div>
                        <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                        <span id="settingsStatus" style="margin-left:12px;font-size:13px;"></span>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
